name: Verify Service

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute verification script
        run: |
          chmod +x scripts/verify.sh
          ./scripts/verify.sh
